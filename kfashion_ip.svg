<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f36"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a971"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Top gold bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#gold)"/>

  <!-- Title -->
  <text x="400" y="70" font-size="18" fill="#ffffff" font-weight="700" text-anchor="middle" letter-spacing="-0.3">IP-Driven Business Strategy for the K-Fashion Industry</text>
  <text x="400" y="94" font-size="12" fill="#c8a971" font-weight="400" text-anchor="middle" opacity="0.8">A Cross-Analysis of Design Patents and Trademarks</text>

  <!-- Divider -->
  <line x1="80" y1="116" x2="720" y2="116" stroke="#c8a971" stroke-opacity="0.2" stroke-width="1"/>

  <!-- THREE NODES: Design Patents | Multimodal AI | Strategy -->

  <!-- Node 1: Design Patents -->
  <rect x="80" y="150" width="170" height="130" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#c8a971" stroke-opacity="0.3" stroke-width="1.2"/>
  <text x="165" y="198" font-size="28" text-anchor="middle" fill="#c8a971">🎨</text>
  <text x="165" y="226" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">Design Patents</text>
  <text x="165" y="246" font-size="10" fill="#c8a971" text-anchor="middle" opacity="0.7">&amp; Trademarks</text>

  <!-- Arrow 1 → 2 -->
  <line x1="252" y1="215" x2="308" y2="215" stroke="#c8a971" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="306,210 316,215 306,220" fill="#c8a971" opacity="0.6"/>

  <!-- Node 2: Multimodal AI (gold filled) -->
  <rect x="318" y="150" width="170" height="130" rx="14" fill="#c8a971"/>
  <text x="403" y="198" font-size="28" text-anchor="middle" fill="#1a1f36">🤖</text>
  <text x="403" y="226" font-size="12" fill="#1a1f36" font-weight="800" text-anchor="middle">Multimodal AI</text>
  <text x="403" y="246" font-size="10" fill="#1a1f36" text-anchor="middle" opacity="0.75">Analysis</text>

  <!-- Arrow 2 → 3 -->
  <line x1="490" y1="215" x2="546" y2="215" stroke="#c8a971" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="544,210 554,215 544,220" fill="#c8a971" opacity="0.6"/>

  <!-- Node 3: Strategy -->
  <rect x="556" y="150" width="170" height="130" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#c8a971" stroke-opacity="0.3" stroke-width="1.2"/>
  <text x="641" y="198" font-size="28" text-anchor="middle" fill="#c8a971">📊</text>
  <text x="641" y="226" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle">Business Strategy</text>
  <text x="641" y="246" font-size="10" fill="#c8a971" text-anchor="middle" opacity="0.7">Recommendations</text>

  <!-- Bottom label -->
  <text x="165" y="310" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.35">K-Fashion IP Data</text>
  <text x="641" y="310" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.35">K-Fashion Enterprises</text>

  <!-- Footer -->
  <line x1="80" y1="348" x2="720" y2="348" stroke="#c8a971" stroke-opacity="0.15" stroke-width="1"/>
  <text x="400" y="372" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.3">Korea Institute of Intellectual Property Promotion (한국특허기술진흥원) · 2026</text>
</svg>
